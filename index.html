<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Seguras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerador de Senhas Seguras</h1>

        <input type="text" id="password" readonly>

        <div class="controls">
            <label>Tamanho:
                <input type="range" id="length" min="8" max="64" value="16">
                <span id="lengthValue">16</span>
            </label>

            <label><input type="checkbox" id="uppercase" checked> Maiúsculas</label>
            <label><input type="checkbox" id="lowercase" checked> Minúsculas</label>
            <label><input type="checkbox" id="numbers" checked> Números</label>
            <label><input type="checkbox" id="symbols" checked> Símbolos</label>
        </div>

        <button id="generate">Gerar Senha</button>
        <button id="copy">Copiar</button>

        <div id="strength"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
